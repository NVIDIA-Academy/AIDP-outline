    margin: 0 auto;
    width: 100%;
    padding: 0 24px;
    gap: 40px;
  }

  .sidebar {
    width: var(--sidebar-w);

    padding: 32px 0;
    position: sticky;
    top: 48px;

  .track-btn {

    text-align: left;
    padding: 8px 12px;
    border: none;
    border-radius: 5px;
    background: transparent;
    font-size: 13px;
    font-family: var(--font);
    color: var(--gray-700);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .track-btn:hover { background: var(--gray-100); color: var(--black); }
  .track-btn.active {
    background: var(--green-light);
    color: var(--green-dark);
    font-weight: 600;
  }

    flex: 1;
    padding: 32px 0 64px;
    min-width: 0;
  }

    margin-top: 12px;
    max-width: 680px;
  }

  .track-panel.active { display: block; }

  .chapter { margin-bottom: 36px; }
  .chapter-header {
    display: flex;
    align-items: baseline;
    gap: 14px;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1.5px solid var(--gray-200);
  }
  .chapter-num {
    font-size: 11px;
    font-weight: 700;
    color: var(--green);
    background: var(--green-light);
    border: 1px solid #c5e08a;
    padding: 2px 9px;
    border-radius: 12px;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }
  .chapter-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--gray-500);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .course {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px 20px;
    padding: 14px 0;
    border-bottom: 1px solid var(--gray-200);
  }
  .course:last-child { border-bottom: none; }
  .course-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--black);
    margin-bottom: 5px;
    line-height: 1.4;
  }
  .course-desc {
    font-size: 13px;
    color: var(--gray-700);
    line-height: 1.6;
    max-width: 600px;
  }
  .course-desc strong { color: var(--black); }
  .course-desc .prereq {
    display: block;
    margin-top: 6px;
    font-size: 12px;
    color: var(--gray-500);
    font-style: italic;
  }
  .course-meta {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 5px;
    flex-shrink: 0;
    padding-top: 2px;
  }
  .badge {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.4px;
    padding: 3px 9px;
    border-radius: 10px;
    white-space: nowrap;
  }

  .badge-workshop { background: #fff3e0; color: #a05000; border: 1px solid #f0c878; }
  .badge-exam     { background: #f3eefe; color: #5b3fa0; border: 1px solid #cdb8f0; }
  .badge-ext      { background: var(--green-light); color: var(--green-dark); border: 1px solid #c5e08a; }
  .duration {
    font-size: 12px;
    color: var(--gray-500);
    font-variant-numeric: tabular-nums;
  }
  .coming-soon {
    font-size: 11px;
    color: var(--gray-500);

    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;

    .course { grid-template-columns: 1fr; }
    .course-meta { flex-direction: row; align-items: center; }

/* ═══════════════════════════════════════════════════════
   RENDERER — no need to edit below
   ═══════════════════════════════════════════════════════ */

const BADGE_CLASS = { self:'badge-self', workshop:'badge-workshop', exam:'badge-exam', ext:'badge-ext' };
const BADGE_LABEL = { self:'Self-Paced', workshop:'Workshop', exam:'Exam', ext:'External · DLI' };

function renderCourse(c) {
  const noteHtml   = c.note   ? `<br><strong>${c.note}</strong>` : '';
  const prereqHtml = c.prereq ? `<span class="prereq">${c.prereq}</span>` : '';
  const durHtml    = c.comingSoon
    ? `<span class="coming-soon">${c.comingSoon}</span>`
    : (c.duration ? `<span class="duration">${c.duration}</span>` : '');
  return `
    <div class="course">
      <div>
        <div class="course-title">${c.title}</div>
        <div class="course-desc">${c.desc}${noteHtml}${prereqHtml}</div>
      </div>
      <div class="course-meta">
        <span class="badge ${BADGE_CLASS[c.type]||'badge-self'}">${BADGE_LABEL[c.type]||'Self-Paced'}</span>
        ${durHtml}
      </div>
    </div>`;
}

function renderChapter(ch) {
  return `
    <div class="chapter">
      <div class="chapter-header">
        <span class="chapter-num">${ch.num}</span>
        <span class="chapter-title">${ch.title}</span>
      </div>
      ${ch.courses.map(renderCourse).join('')}
    </div>`;
}

function renderTrack(track, active) {
  return `
    <div class="track-panel${active?' active':''}" id="${track.id}">
      ${track.chapters.map(renderChapter).join('')}
    </div>`;
}

function switchTrack(id) {
  document.querySelectorAll('.track-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.track-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelector(`[data-track="${id}"]`).classList.add('active');
}

document.getElementById('pageTitle').textContent   = PAGE.title;
document.getElementById('pageSubtitle').textContent = PAGE.subtitle;
document.getElementById('pageIntro').textContent    = PAGE.intro;
document.getElementById('footerDate').textContent   = 'LAST UPDATED ' + PAGE.lastUpdated;

document.getElementById('trackNav').innerHTML = TRACKS.map((t,i) =>
  `<button class="track-btn${i===0?' active':''}" data-track="${t.id}" onclick="switchTrack('${t.id}')">${t.label}</button>`
).join('');

document.getElementById('trackPanels').innerHTML = TRACKS.map((t,i) => renderTrack(t,i===0)).join('');
</script>
